site_name: MAP Core Developer Docs
docs_dir: docs/core
site_dir: site/core
site_url: https://memetic-activation-platform.github.io/map-dev-docs/

theme:
  name: material
  features:
    - navigation.instant
    - search.highlight
    - navigation.top
    - navigation.footer
    - content.action.edit
  palette:
    - scheme: default
      primary: indigo
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search

markdown_extensions:
  - attr_list
  - toc:
      permalink: true
  - admonition
  - footnotes
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight
  - pymdownx.snippets:
      base_path: docs

nav:
  - Home: index.md

  - MAP Architecture:
      - Agent Spaces Architecture: agent-space-arch.md
      - Deployment Architecture: deployment-arch.md
      - Holon Layered Representation Design Spec: holon-layered-representation-design-spec.md
      - Rust API (draft): rust-api.md
      - Internationalization Design Spec: i18n-design-spec.md
      - MAP Query Architecture (Draft): map-queries/query-arch.md
