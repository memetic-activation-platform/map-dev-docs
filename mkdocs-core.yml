site_name: MAP Core Developer Docs
docs_dir: docs/core
site_dir: site/core
site_url: https://memetic-activation-platform.github.io/map-dev-docs/

theme:
  name: material
  features:
    - navigation.instant
    - search.highlight
    - navigation.top
    - navigation.footer
    - content.action.edit
  palette:
    - scheme: default
      primary: indigo
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search

markdown_extensions:
  - attr_list
  - toc:
      permalink: true
  - admonition
  - footnotes
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight
  - pymdownx.snippets:
      base_path: docs

nav:
  - Home: index.md

  - MAP Architecture:
      - Agent Spaces Architecture: agent-space-arch.md
      - Deployment Architecture: deployment-arch.md
      - Rust API (draft): rust-api.md
      - Internationalization Design Spec: i18n-design-spec.md
      - MAP Query Architecture (Draft): map-queries/query-arch.md

  - Shared Components:
    - MAP Type System: type-system/map-type-system-revised.md
    - MAP Type Definition: type-system/type-definition-semantics.md

  - MAP Guest (happ layer):
    - WASM Crate Guidelines (v2): wasm-crate-guidelines-v2.md

  - MAP Core HX Development Specs (Experience Layer):
    - MAP TypeScript SDK and Supporting Components: hx/map-ts-sdk-impl.md
    - DAHN Implementation Plan: hx/dahn-implementation-plan.md
    - DAHN Phase 0 Design Spec: hx/phase-0-post-408-spec.md
    - DAHN Phase 0 Implementation Blueprint: hx/phase-0-implementation-blueprint.md

  - MAP Integration Hub:
    - MAP Transaction Model: transaction-model-v1.1.md
    - MAP Query Support:
      - Overview of MAP Queries: map-queries/index.md
      - Minimum Query Algebra: map-queries/navigation-algebra.md
      - Type Resolution: map-queries/exec-time-type-resolution.md
      - Full Cypher Algebra: map-queries/cypher-operator-inventory.md
      - Distributed (Cross-Space) Queries: map-queries/distributed-query-semantics.md
    - MAP Commands and Runtime Layer:
      - MAP Commands: commands-and-runtime/commands.md
      - MAP Commands Cheat Sheet: commands-and-runtime/commands-cheat-sheet.md
      - Structural Approach to Experience-Level Undo / Redo: commands-and-runtime/struct-exp-undo-redo.md
      - Undo / Redo Spec Change Log: commands-and-runtime/undo-redo-change-log.md
    - MAP Descriptors Runtime Support:
        - MAP Descriptors Implementation Plan (Design Discussion): https://github.com/evomimic/map-holons/discussions/454
        - MAP Descriptors Design Spec: descriptors/descriptors-design-spec.md
        - Ripple Effects of MAP Core Schema Changes: descriptors/schema-ripple-design-spec.md

    - Dances Design Spec: dances-design.md
    - Capsulization Strategy: capsulization.md
    - Trust Channel Design Spec: trust-channel-design-spec.md
    - Trust Channel Entry Points Architecture: trust-channel-entry-points.md
    - Holon Loader Spec: holon-data-loader-design-spec.md
    - Meta-Value Import Guide: type-system/meta-value-types-import-guide.md

