site_name: MAP Roadmap
docs_dir: docs/roadmap
site_dir: site/roadmap
site_url: https://memetic-activation-platform.github.io/map-dev-docs/

theme:
  name: material
  features:
    - navigation.instant
    - search.highlight
    - navigation.top
    - navigation.footer
    - content.action.edit
  palette:
    - scheme: default
      primary: indigo
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search

markdown_extensions:
  - attr_list
  - toc:
      permalink: true
  - admonition
  - footnotes
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.snippets:
      base_path: docs

nav:
  - Home: index.md

  - MAP Roadmap:
      - High-Level Roadmap: map-roadmap-v0.3.md
      - Funding Strategies: funding-strategies.md
      - Funding and Roadmap: roadmap-funding.md
      - Outreach Plan: map-outreach-plan.md
      - Roadmap as Civilizational Capacities: civilizational-capacities.md



