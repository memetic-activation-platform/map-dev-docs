site_name: Memetic Activation Platform
docs_dir: docs/home
site_dir: site
site_url: https://memetic-activation-platform.github.io/map-dev-docs/

theme:
  name: material
  custom_dir: docs/home/overrides
  features:
    - navigation.instant
    - search.highlight
    - navigation.top
    - navigation.footer
    - content.action.edit
  palette:
    - scheme: default
      primary: indigo
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search

markdown_extensions:
  - attr_list
  - toc:
      permalink: true
  - admonition
  - footnotes
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight
  - pymdownx.snippets:
      base_path: docs

nav:
  - Home: index.md
  - MAP Core Docs: https://memetic-activation-platform.github.io/map-dev-docs/core/
  - Application Developer Docs: https://memetic-activation-platform.github.io/map-dev-docs/mapp-dev/
  - Roadmap and Context: https://memetic-activation-platform.github.io/map-dev-docs/roadmap/
  - DAHN Docs: https://memetic-activation-platform.github.io/map-dev-docs/dahn/

extra_css:
  - overrides/home.css
